<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Green Snake</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hud">
        <h1>Snake // Green Terminal</h1>
        <div class="score-row">
          <span>Score: <strong id="score">0</strong></span>
          <span>High Score: <strong id="high-score">0</strong></span>
        </div>
      </header>

      <section class="controls" aria-label="Game controls">
        <label>
          Grid Size
          <select id="grid-size">
            <option value="16">16 x 16</option>
            <option value="24" selected>24 x 24</option>
            <option value="32">32 x 32</option>
          </select>
        </label>

        <label>
          Difficulty
          <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="normal" selected>Normal</option>
            <option value="hard">Hard</option>
          </select>
        </label>

        <button id="start-btn" type="button">Start / Restart</button>
        <button id="pause-btn" type="button" disabled>Pause</button>
      </section>

      <section class="screen-wrap" aria-live="polite">
        <canvas id="game" width="576" height="576" aria-label="Snake game board"></canvas>
        <div id="overlay" class="overlay">
          <p id="overlay-text">Press Start to begin.</p>
          <p class="overlay-hint">Controls: Arrow Keys or WASD</p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
